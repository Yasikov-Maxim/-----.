<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .user-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>Мой профиль</h3>
    <p id="myInfo">Загрузка...</p>
    <div class="grid">
        <button style="background: #28a745;" onclick="changeStatus('Учусь', '#28a745')">📚 Учусь</button>
        <button style="background: #ffc107; color: black;" onclick="changeStatus('Кофе', '#ffc107')">☕ Кофе</button>
        <button style="background: #17a2b8;" onclick="changeStatus('В игре', '#17a2b8')">🎮 В игре</button>
        <button style="background: #6c757d;" onclick="changeStatus('Дома', '#6c757d')">🏠 Дома</button>
    </div>
</div>

<div class="card">
    <h3>Монитор группы</h3>
    <div id="groupList"></div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const URL = 'https://mdkbkuffvgatlqauxpml.supabase.co';

  const KEY = sb_publishable_FlSehNzF2mQ4DygdbbkoTQ_gThvpdt7;

  const supabase = createClient(URL, KEY);


  const MY_ID = '8b6425ac-6cdf-490f-914f-f4ed8de4ac8b';

    window.changeStatus = async (text, color) => {
        await supabase.from('profiles').update({ status: text, color: color }).eq('id', MY_ID);
        fetchGroup();
    };

    async function fetchGroup() {
        const { data } = await supabase.from('profiles').select('*').order('username');
        const list = document.getElementById('groupList');
        
        list.innerHTML = data.map(user => `
            <div class="user-item">
                <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                <div>
                    <strong>${user.username}</strong><br>
                    <small>${user.status || 'Статус не задан'}</small>
                </div>
            </div>
        `).join('');

        const me = data.find(u => u.id === MY_ID);
        if (me) document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
    }

    fetchGroup();
    setInterval(fetchGroup, 5000);
</script>

</body>
</html>
